<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="stack1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="stack2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="stack3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow behind stack -->
  <ellipse cx="256" cy="290" rx="140" ry="60" fill="url(#glow)" opacity="0.3"/>

  <!-- Stack layers (3D isometric-style blocks) -->
  <!-- Bottom layer - cyan/blue -->
  <g transform="translate(256, 340)">
    <path d="M-120,0 L0,-36 L120,0 L0,36 Z" fill="url(#stack1)" opacity="0.95"/>
    <path d="M-120,0 L-120,28 L0,64 L0,36 Z" fill="#0099cc" opacity="0.8"/>
    <path d="M120,0 L120,28 L0,64 L0,36 Z" fill="#2563eb" opacity="0.7"/>
  </g>

  <!-- Middle layer - purple -->
  <g transform="translate(256, 280)">
    <path d="M-120,0 L0,-36 L120,0 L0,36 Z" fill="url(#stack2)" opacity="0.95"/>
    <path d="M-120,0 L-120,28 L0,64 L0,36 Z" fill="#6d28d9" opacity="0.8"/>
    <path d="M120,0 L120,28 L0,64 L0,36 Z" fill="#7c3aed" opacity="0.7"/>
  </g>

  <!-- Top layer - pink/orange -->
  <g transform="translate(256, 220)">
    <path d="M-120,0 L0,-36 L120,0 L0,36 Z" fill="url(#stack3)" opacity="0.95"/>
    <path d="M-120,0 L-120,28 L0,64 L0,36 Z" fill="#db2777" opacity="0.8"/>
    <path d="M120,0 L120,28 L0,64 L0,36 Z" fill="#ea580c" opacity="0.7"/>
  </g>

  <!-- Antenna / signal dot on top -->
  <circle cx="256" cy="168" r="8" fill="#00d2ff">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="168" r="16" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.4">
    <animate attributeName="r" values="16;28;16" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- "Mr." text -->
  <text x="256" y="440" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="2">Mr.Stack</text>
</svg>
